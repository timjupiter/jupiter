<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Template H2H</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>

/* =====================
   RESET & BASE
   ===================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  display: flex;
  gap: 20px;
  padding: 20px;
  min-height: 100vh;
}

/* =====================
   PANELS
   ===================== */
#html1, #html2 {
  width: 48%;
  padding: 20px;
  background: #fff;
  border-radius: 10px;
  box-shadow: 0 2px 10px rgba(0,0,0,.1);
}

/* =====================
   PANEL KIRI — FORM
   ===================== */
#html1 h2 { text-align: center; margin-bottom: 16px; }

#html1 label {
  font-weight: bold;
  display: block;
  margin-bottom: 5px;
}

#html1 input,
#html1 select,
#html1 textarea,
#html1 button {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border: 1px solid #ccc;
  border-radius: 5px;
}

#html1 button {
  background: #4CAF50;
  color: #fff;
  border: none;
  cursor: pointer;
  transition: background .2s;
}
#html1 button:hover:not(:disabled) { background: #45a049; }
#html1 button:disabled { background: #aaa; cursor: not-allowed; }

#result, #updateResult {
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 5px;
  background: #f8f9fa;
  white-space: pre-wrap;
  font-family: monospace;
  font-size: 14px;
  display: none;
}

/* =====================
   PANEL KANAN — BOARD
   ===================== */
#html2 {
  display: flex;
  flex-direction: column;
  align-items: center;
}

#clock {
  font-size: 40px;
  background: #343a40;
  color: #fff;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
  width: 100%;
  max-width: 300px;
  margin-bottom: 20px;
  letter-spacing: 2px;
  font-variant-numeric: tabular-nums;
}

.container { width: 100%; }

.box {
  background: #f8f9fa;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
}
.box h3 { margin-bottom: 10px; }

/* =====================
   SEARCH
   ===================== */
.search-input {
  width: 100%;
  padding: 7px 10px;
  border: 1px solid #ccc;
  border-radius: 5px;
  font-size: 13px;
  margin-bottom: 10px;
}
.search-input:focus { outline: none; border-color: #007bff; }

/* =====================
   ROWS
   ===================== */
.row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 0;
  border-bottom: 1px solid #ddd;
  cursor: grab;
  transition: background .15s;
}
.row:last-child { border-bottom: none; }
.row.drag-over { background: #e8f4ff; border-radius: 5px; }
.row.dragging { opacity: .4; }

.text { flex: 1; font-size: 14px; word-break: break-word; }

.copy, .edit, .del, .addBtn {
  border: none;
  border-radius: 5px;
  cursor: pointer;
  color: #fff;
  padding: 7px 10px;
  font-size: 12px;
  white-space: nowrap;
  flex-shrink: 0;
  transition: opacity .15s;
}
.copy   { background: #007bff; }
.edit   { background: #ffc107; color: #000; }
.del    { background: #dc3545; }
.addBtn { background: #28a745; margin-bottom: 10px; }
.copy:hover, .edit:hover, .del:hover, .addBtn:hover { opacity: .85; }

/* =====================
   SKELETON LOADING
   ===================== */
.skeleton {
  background: linear-gradient(90deg, #e0e0e0 25%, #f0f0f0 50%, #e0e0e0 75%);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
  border-radius: 4px;
  height: 14px;
  margin: 8px 0;
}
.skeleton.short { width: 60%; }
.skeleton.long  { width: 90%; }

@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* =====================
   NOTIFICATION
   ===================== */
#notification {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #28a745;
  color: #fff;
  padding: 12px 20px;
  border-radius: 5px;
  opacity: 0;
  visibility: hidden;
  transition: opacity .3s, visibility .3s;
  z-index: 9999;
  pointer-events: none;
}
#notification.show { opacity: 1; visibility: visible; }

/* =====================
   RESPONSIVE
   ===================== */
@media (max-width: 600px) {
  body { flex-direction: column; }
  #html1, #html2 { width: 100%; }
}

</style>
</head>
<body>

<!-- ======================== PANEL KIRI ======================== -->
<div id="html1">
  <h2>Kata - kata hari ini</h2>

  <form id="statusForm">
    <label for="deviceName">Nama Perangkat :</label>
    <input type="text" id="deviceName" placeholder="Pisah koma untuk banyak perangkat" required>

    <label for="status">Status Ping &amp; Traceroute :</label>
    <select id="status" required>
      <option value="online">Online</option>
      <option value="offline">Offline</option>
    </select>

    <button type="submit" id="submitButton" disabled>Tampilkan Hasil</button>
  </form>

  <div id="result"></div>
  <button id="copyButton" style="display:none;">Copy Hasil</button>

  <textarea id="updateResult" rows="5" readonly></textarea>
  <button id="copyUpdateButton" style="display:none;">Copy Update</button>
</div>


<!-- ======================== PANEL KANAN ======================== -->
<div id="html2">
  <div id="clock">00:00:00</div>

  <div class="container">
    <div id="mrtg"      class="box"></div>
    <div id="dashboard" class="box"></div>
    <div id="update"    class="box"></div>
  </div>
</div>

<div id="notification">✓ Berhasil disalin!</div>


<!-- ======================== SCRIPT ======================== -->
<script>

/* ============================================================
   SUPABASE INIT
   ============================================================ */
const SUPABASE_URL = "https://eaqmgrchnbetoetojdgu.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhcW1ncmNobmJldG9ldG9qZGd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwODY2NzEsImV4cCI6MjA5NjY2MjY3MX0.7v3yBoDiQbX1Y3Ass75MyaehdbiK0EjDPIIQKYdioM8";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);


/* ============================================================
   CACHE & STATE
   ============================================================ */
const cache   = { mrtg: null, dashboard: null, update: null };
const SECTIONS = ["mrtg", "dashboard", "update"];

// search queries per section, preserved across renders
const searchState = { mrtg: "", dashboard: "", update: "" };

// drag-reorder state
let dragSrc = null;


/* ============================================================
   HELPERS
   ============================================================ */
function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

function pad(n) { return String(n).padStart(2, "0"); }


/* ============================================================
   SKELETON
   ============================================================ */
function renderSkeleton(section) {
  const box = document.getElementById(section);
  box.innerHTML = `
    <h3>${section.toUpperCase()}</h3>
    <div class="skeleton long"></div>
    <div class="skeleton short"></div>
    <div class="skeleton long"></div>
    <div class="skeleton short"></div>`;
}


/* ============================================================
   RENDER SECTION  (diff-aware: reuse existing rows)
   ============================================================ */
function renderSection(section, data) {
  const box      = document.getElementById(section);
  const query    = searchState[section].toLowerCase();
  const filtered = data.filter(x => x.template.toLowerCase().includes(query));

  // ── header (idempotent) ──────────────────────────────────
  let header = box.querySelector(".section-header");
  if (!header) {
    header = document.createElement("div");
    header.className = "section-header";
    header.innerHTML = `
      <h3>${section.toUpperCase()}</h3>
      <button class="addBtn" data-section="${section}">+ Tambah</button>
      <input  class="search-input" placeholder="Cari template…" value="${searchState[section]}">`;
    header.querySelector(".addBtn").addEventListener("click", () => addData(section));
    header.querySelector(".search-input").addEventListener("input", function () {
      searchState[section] = this.value;
      renderSection(section, cache[section] || []);
    });
    box.innerHTML = "";
    box.appendChild(header);
  }

  // ── row list ─────────────────────────────────────────────
  const existingRows = {};
  box.querySelectorAll(".row[data-id]").forEach(el => {
    existingRows[el.dataset.id] = el;
  });

  const ordered = [];

  filtered.forEach(x => {
    const sid = String(x.id);
    let row = existingRows[sid];

    if (row) {
      // update raw template & resolved display in-place
      const textEl = row.querySelector(".text");
      if (textEl.dataset.template !== x.template) {
        textEl.dataset.template = x.template;
        textEl.textContent      = x.template.replaceAll("{TIME}", getCurrentTimeLabel());
      }
      delete existingRows[sid]; // mark as kept
    } else {
      row = buildRow(x, section);
    }
    ordered.push(row);
  });

  // remove stale rows
  Object.values(existingRows).forEach(el => el.remove());

  // append / reorder
  ordered.forEach(row => box.appendChild(row));

  // empty state
  let empty = box.querySelector(".empty-msg");
  if (filtered.length === 0) {
    if (!empty) {
      empty = document.createElement("p");
      empty.className = "empty-msg";
      empty.style.cssText = "color:#999;font-size:13px;padding:8px 0;";
      empty.textContent = "Tidak ada template.";
    }
    box.appendChild(empty);
  } else if (empty) {
    empty.remove();
  }
}

function buildRow(x, section) {
  const row = document.createElement("div");
  row.className  = "row";
  row.dataset.id = x.id;
  row.draggable  = true;

  const textDiv = document.createElement("div");
  textDiv.className        = "text";
  textDiv.dataset.template = x.template;                        // raw (dengan {TIME})
  textDiv.textContent      = x.template.replaceAll("{TIME}", getCurrentTimeLabel());

  const copyBtn = document.createElement("button");
  copyBtn.className   = "copy";
  copyBtn.textContent = "Copy";
  copyBtn.addEventListener("click", () => copyTextToClipboard(x.template));

  const editBtn = document.createElement("button");
  editBtn.className   = "edit";
  editBtn.textContent = "Edit";
  editBtn.addEventListener("click", () => editData(x.id));

  const delBtn = document.createElement("button");
  delBtn.className   = "del";
  delBtn.textContent = "X";
  delBtn.addEventListener("click", () => deleteData(x.id));

  // ── drag-reorder events ──────────────────────────────────
  row.addEventListener("dragstart", e => {
    dragSrc = row;
    row.classList.add("dragging");
    e.dataTransfer.effectAllowed = "move";
  });
  row.addEventListener("dragend", () => {
    row.classList.remove("dragging");
    document.querySelectorAll(".row.drag-over")
      .forEach(el => el.classList.remove("drag-over"));
  });
  row.addEventListener("dragover", e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = "move";
    if (dragSrc && dragSrc !== row) row.classList.add("drag-over");
  });
  row.addEventListener("dragleave", () => row.classList.remove("drag-over"));
  row.addEventListener("drop", e => {
    e.stopPropagation();
    row.classList.remove("drag-over");
    if (!dragSrc || dragSrc === row) return;

    // reorder in DOM
    const parent = row.parentNode;
    const rows   = [...parent.querySelectorAll(".row[data-id]")];
    const srcIdx = rows.indexOf(dragSrc);
    const tgtIdx = rows.indexOf(row);
    if (srcIdx < tgtIdx) parent.insertBefore(dragSrc, row.nextSibling);
    else                  parent.insertBefore(dragSrc, row);

    // persist new sort_order
    saveSortOrder(section, parent);
  });

  row.append(textDiv, copyBtn, editBtn, delBtn);
  return row;
}

async function saveSortOrder(section, parent) {
  const rows = [...parent.querySelectorAll(".row[data-id]")];
  const updates = rows.map((el, i) =>
    db.from("h2h_messages").update({ sort_order: i }).eq("id", el.dataset.id)
  );
  await Promise.all(updates);
  // DOM sudah mencerminkan urutan baru, tidak perlu reload
}


/* ============================================================
   LOAD — fetch one section, update cache, render
   ============================================================ */
const MAX_RETRIES = 3;

// DataCloneError adalah bug internal Supabase client (postMessage Headers),
// bukan network/query error — jangan di-retry.
function isRetryable(error) {
  if (!error) return false;
  const msg  = (error.message || "").toLowerCase();
  const code = (error.code    || "");
  if (msg.includes("datacloneerror")) return false;
  if (msg.includes("postmessage"))    return false;
  // PostgreSQL errors (PGRST = PostgREST, angka = pg error code) — permanen
  if (/^(pgrst|[0-9A-Z]{5})/.test(code)) return false;
  return true;
}

async function loadSection(section, showSkeleton = false, retryCount = 0) {
  if (showSkeleton && !cache[section]) renderSkeleton(section);

  let data, error;

  try {
    ({ data, error } = await db
      .from("h2h_messages")
      .select("*")
      .eq("section", section)
      .order("sort_order"));
  } catch (e) {
    // Exception (mis. DataCloneError dari Supabase internal) — abaikan, pakai cache
    if (cache[section]) renderSection(section, cache[section]);
    return;
  }

  if (error) {
    if (isRetryable(error) && retryCount < MAX_RETRIES) {
      const delay = 1000 * 2 ** retryCount; // 1s, 2s, 4s
      console.warn(`[${section}] retry ${retryCount + 1} in ${delay}ms…`, error.message);
      setTimeout(() => loadSection(section, false, retryCount + 1), delay);
    } else {
      // Error permanen atau retry habis — pakai cache kalau ada
      console.error(`[${section}] error:`, error.message);
      if (cache[section]) {
        renderSection(section, cache[section]);
      } else {
        document.getElementById(section).innerHTML =
          `<p style="color:red;">Gagal memuat <strong>${section}</strong>. Coba refresh halaman.</p>`;
      }
    }
    return;
  }

  cache[section] = data || [];
  renderSection(section, cache[section]);
}

async function loadAll(showSkeleton = false) {
  await Promise.all(SECTIONS.map(s => loadSection(s, showSkeleton)));
}

// ⚠ Harus dideklarasikan SEBELUM updateClock dipanggil
const debouncedLoadAll = debounce(() => loadAll(), 400);

// initial load with skeleton
loadAll(true);


/* ============================================================
   CLOCK  — dideklarasikan SETELAH debouncedLoadAll
   ============================================================ */
let lastHourLabel = "";

let lastMinute = -1;

function updateTimeDisplay() {
  // Update semua .text yang punya {TIME} dengan jam aktual
  document.querySelectorAll(".text[data-template]").forEach(el => {
    if (el.dataset.template.includes("{TIME}")) {
      el.textContent = el.dataset.template.replaceAll("{TIME}", getCurrentTimeLabel());
    }
  });
}

function updateClock() {
  const now = new Date();
  const h   = now.getHours();
  const m   = now.getMinutes();
  const s   = now.getSeconds();

  document.getElementById("clock").textContent =
    `${pad(h)}:${pad(m)}:${pad(s)}`;

  // Update tampilan {TIME} setiap menit berubah
  if (m !== lastMinute) {
    lastMinute = m;
    updateTimeDisplay();
  }

  // trigger reload di menit :00 dan :30
  const roundedH = m >= 30 ? (h + 1) % 24 : h;
  const label    = `${pad(roundedH)}:00`;

  if (label !== lastHourLabel) {
    lastHourLabel = label;
    debouncedLoadAll();
  }
}

setInterval(updateClock, 1000);
updateClock();


/* ============================================================
   REALTIME — partial update per section
   ============================================================ */
let realtimeChannel = null;

function subscribeRealtime() {
  if (realtimeChannel) {
    db.removeChannel(realtimeChannel);
    realtimeChannel = null;
  }

  realtimeChannel = db.channel("h2h-sync")
    .on(
      "postgres_changes",
      { event: "*", schema: "public", table: "h2h_messages" },
      (payload) => {
        // only reload the affected section, not all three
        const section =
          payload?.new?.section ||
          payload?.old?.section;

        if (section && SECTIONS.includes(section)) {
          loadSection(section);
        } else {
          debouncedLoadAll();
        }
      }
    )
    .subscribe();
}

subscribeRealtime();

// cleanup on page unload
window.addEventListener("beforeunload", () => {
  if (realtimeChannel) db.removeChannel(realtimeChannel);
});


/* ============================================================
   CRUD
   ============================================================ */
async function addData(section) {
  const t = prompt(
`CATATAN:
- Gunakan {TIME} untuk jam otomatis.

Contoh:
Gangguan terdeteksi pukul {TIME}`
  );
  if (!t) return;

  await db.from("h2h_messages").insert({
    section,
    template: t,
    sort_order: 999
  });
  // realtime will trigger loadSection; no need to call manually
}

async function editData(id) {
  const { data } = await db
    .from("h2h_messages")
    .select("*")
    .eq("id", id)
    .single();

  const t = prompt("Edit template:", data.template);
  if (!t) return;

  await db.from("h2h_messages").update({ template: t }).eq("id", id);
}

async function deleteData(id) {
  if (!confirm("Hapus template ini?")) return;
  await db.from("h2h_messages").delete().eq("id", id);
}


/* ============================================================
   FORM — PANEL KIRI
   ============================================================ */
document.getElementById("statusForm").addEventListener("input", function () {
  const name   = document.getElementById("deviceName").value.trim();
  const status = document.getElementById("status").value;
  document.getElementById("submitButton").disabled = !(name && status);
});

  const list = deviceNames.map(n => `*${n.trim()}*`).join("\n");

  let resultText, updateText;

  if (deviceNames.length > 1) {
    if (status === "online") {
      resultText =
`FYI,

Kami informasikan bahwa status koneksi remote berikut :
${list}
termonitor *DOWN* pada dashboard monica, namun hasil pengecekan trace dan ping *ONLINE*.

Terimakasih.`;
    } else {
      resultText =
`FYI,

Kami informasikan bahwa status koneksi remote berikut :
${list}
termonitor *DOWN* pada dashboard monica, hasil pengecekan traceroute dan ping *OFFLINE* dan saat ini sedang dalam pengecekan lebih lanjut.

Terimakasih.`;
    }

    updateText =
`UPDATE,

Kami informasikan kembali saat ini remote berikut :
${list}
sudah termonitor *ONLINE* kembali pada dashboard monica.

Terimakasih.`;

  } else {
    const name = deviceNames[0].trim();

    if (status === "online") {
      resultText =
`FYI,

Kami informasikan bahwa status koneksi *${name}* termonitor *DOWN* pada dashboard monica, namun hasil pengecekan trace dan ping *ONLINE*.

Terimakasih.`;
    } else {
      resultText =
`FYI,

Kami informasikan bahwa status koneksi *${name}* termonitor *DOWN* pada dashboard monica, hasil pengecekan traceroute dan ping *OFFLINE* dan saat ini sedang dalam pengecekan lebih lanjut.

Terimakasih.`;
    }

    updateText =
`UPDATE,

Kami informasikan kembali remote *${name}* sudah termonitor *ONLINE* kembali pada dashboard monica.

Terimakasih.`;
  }

  const resultDiv    = document.getElementById("result");
  const updateArea   = document.getElementById("updateResult");
  const copyBtn      = document.getElementById("copyButton");
  const copyUpdateBtn = document.getElementById("copyUpdateButton");

  resultDiv.textContent  = resultText;
  resultDiv.style.display = "block";

  updateArea.value        = updateText;
  updateArea.style.display = "block";

  copyBtn.style.display      = "inline-block";
  copyUpdateBtn.style.display = "inline-block";
});

document.getElementById("copyButton").addEventListener("click", () =>
  copyTextToClipboard(document.getElementById("result").textContent));

document.getElementById("copyUpdateButton").addEventListener("click", () =>
  copyTextToClipboard(document.getElementById("updateResult").value));


/* ============================================================
   CLIPBOARD + TOAST
   ============================================================ */
let toastTimer;

// Kembalikan jam laporan berikutnya:
// menit 0–29  → jam sekarang   :00  (misal 09:15 → "09:00 WIB")
// menit 30–59 → jam berikutnya :00  (misal 09:35 → "10:00 WIB")
function getCurrentTimeLabel() {
  const now = new Date();
  const h   = now.getHours();
  const m   = now.getMinutes();
  if (m >= 30) {
    const nextH = (h + 1) % 24;
    return `${pad(nextH)}:00 WIB`;
  }
  return `${pad(h)}:00 WIB`;
}

function copyTextToClipboard(text) {
  // Ganti {TIME} dengan jam aktual saat tombol Copy ditekan
  const resolved = text.replaceAll("{TIME}", getCurrentTimeLabel());
  navigator.clipboard.writeText(resolved).then(() => {
    const notif = document.getElementById("notification");
    notif.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => notif.classList.remove("show"), 2000);
  });
}

</script>
