<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitoring Jupiter</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>

/* =====================
   RESET & BASE
   ===================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Arial, sans-serif;
  background: #e9ecef;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 30px 20px;
  min-height: 100vh;
}

/* =====================
   CLOCK
   ===================== */
#clock {
  font-size: 60px;
  background: #343a40;
  color: #fff;
  padding: 20px 40px;
  border-radius: 10px;
  text-shadow: 2px 2px 4px rgba(0,0,0,.5);
  margin-bottom: 30px;
  box-shadow: 0 2px 10px rgba(0,0,0,.1);
  letter-spacing: 2px;
  font-variant-numeric: tabular-nums;
}

/* =====================
   MAIN CONTAINER
   ===================== */
.container {
  display: flex;
  gap: 30px;
  width: 90%;
  max-width: 1200px;
  background: #fff;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 2px 10px rgba(0,0,0,.1);
}

/* =====================
   PANEL KIRI — TEMPLATE LIST
   ===================== */
.panel-left {
  flex: 1;
  background: #f8f9fa;
  border-radius: 8px;
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.panel-left h3 {
  margin-bottom: 10px;
  font-size: 15px;
  color: #343a40;
}

/* search */
.search-input {
  width: 100%;
  padding: 7px 10px;
  border: 1px solid #ccc;
  border-radius: 5px;
  font-size: 13px;
  margin-bottom: 10px;
}
.search-input:focus { outline: none; border-color: #007bff; }

/* add button */
.addBtn {
  background: #28a745;
  color: #fff;
  border: none;
  border-radius: 5px;
  padding: 8px 12px;
  font-size: 13px;
  cursor: pointer;
  margin-bottom: 10px;
  transition: opacity .15s;
}
.addBtn:hover { opacity: .85; }

/* rows */
.row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 0;
  border-bottom: 1px solid #dee2e6;
  cursor: grab;
  transition: background .15s;
}
.row:last-child { border-bottom: none; }
.row.drag-over { background: #e8f4ff; border-radius: 5px; }
.row.dragging  { opacity: .4; }

.text {
  flex: 1;
  font-size: 14px;
  word-break: break-word;
}

.copy-btn, .edit-btn, .del-btn {
  border: none;
  border-radius: 5px;
  cursor: pointer;
  color: #fff;
  padding: 7px 10px;
  font-size: 12px;
  white-space: nowrap;
  flex-shrink: 0;
  transition: opacity .15s;
}
.copy-btn { background: #007bff; }
.edit-btn  { background: #ffc107; color: #000; }
.del-btn   { background: #dc3545; }
.copy-btn:hover, .edit-btn:hover, .del-btn:hover { opacity: .85; }

/* skeleton */
.skeleton {
  background: linear-gradient(90deg, #e0e0e0 25%, #f0f0f0 50%, #e0e0e0 75%);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
  border-radius: 4px;
  height: 14px;
  margin: 8px 0;
}
.skeleton.short { width: 60%; }
.skeleton.long  { width: 90%; }

@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.empty-msg {
  color: #999;
  font-size: 13px;
  padding: 8px 0;
}

/* =====================
   PANEL KANAN — FORM
   ===================== */
.panel-right {
  flex: 1;
  background: #f8f9fa;
  border-radius: 8px;
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.panel-right select {
  width: 100%;
  padding: 12px;
  border-radius: 5px;
  border: 1px solid #ced4da;
  background: #fff;
  font-size: 15px;
}

.hidden { display: none !important; }

.custom-textarea {
  width: 100%;
  min-height: 130px;
  padding: 12px;
  border-radius: 5px;
  border: 1px solid #ced4da;
  background: #fdfdfe;
  font-size: 14px;
  font-weight: bold;
  white-space: pre-wrap;
  word-break: break-word;
  box-shadow: inset 0 1px 3px rgba(0,0,0,.1);
}

.form-actions {
  display: flex;
  gap: 10px;
}

.action-btn {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  color: #fff;
  font-size: 14px;
  background: linear-gradient(45deg, #007bff, #0056b3);
  transition: transform .2s, box-shadow .2s;
}
.action-btn:hover {
  transform: scale(1.03);
  box-shadow: 0 4px 15px rgba(0,0,0,.2);
}
.action-btn.clear {
  background: linear-gradient(45deg, #6c757d, #495057);
}

/* =====================
   NOTIFICATION
   ===================== */
#notification {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #28a745;
  color: #fff;
  padding: 12px 20px;
  border-radius: 5px;
  opacity: 0;
  visibility: hidden;
  transition: opacity .3s, visibility .3s;
  z-index: 9999;
  pointer-events: none;
}
#notification.show { opacity: 1; visibility: visible; }

/* =====================
   RESPONSIVE
   ===================== */
@media (max-width: 768px) {
  .container { flex-direction: column; }
}

</style>
</head>
<body>

<div id="clock">00:00:00</div>

<div class="container">

  <!-- ===== PANEL KIRI ===== -->
  <div class="panel-left" id="templatePanel">
    <div class="skeleton long"></div>
    <div class="skeleton short"></div>
    <div class="skeleton long"></div>
    <div class="skeleton short"></div>
  </div>

  <!-- ===== PANEL KANAN ===== -->
  <div class="panel-right">

    <select id="menuSelect">
      <option value="">Pilih Menu</option>
      <option value="C-BAND">C-BAND</option>
      <option value="EXT-C">EXT C</option>
      <option value="KU BAND">KU BAND</option>
      <option value="SATDIV">SATDIV</option>
      <option value="Beam XXX">BEAM</option>
    </select>

    <div id="beamOptionsWrapper" class="hidden">
      <select id="beamSelect">
        <option value="">Pilih Beam</option>
        <option value="BEAM 101 - C BAND">BEAM 101 - C BAND</option>
        <option value="BEAM 201 - C BAND">BEAM 201 - C BAND</option>
        <option value="BEAM 102 - EXT C">BEAM 102 - EXT C</option>
        <option value="BEAM 202 - EXT C">BEAM 202 - EXT C</option>
        <option value="BEAM 103 - KU BAND">BEAM 103 - KU BAND</option>
        <option value="BEAM 203 - KU BAND">BEAM 203 - KU BAND</option>
        <option value="BEAM 104 - C BAND">BEAM 104 - C BAND</option>
        <option value="BEAM 204 - C BAND">BEAM 204 - C BAND</option>
        <option value="BEAM 105 - EXT C">BEAM 105 - EXT C</option>
        <option value="BEAM 205 - EXT C">BEAM 205 - EXT C</option>
        <option value="BEAM 106 - EXT C">BEAM 106 - EXT C</option>
        <option value="BEAM 206 - EXT C">BEAM 206 - EXT C</option>
        <option value="BEAM 107 - C BAND">BEAM 107 - C BAND</option>
        <option value="BEAM 207 - C BAND">BEAM 207 - C BAND</option>
      </select>
    </div>

    <div id="infoTextarea" class="custom-textarea" contenteditable="true"></div>

    <div class="form-actions">
      <button class="action-btn" onclick="copyTextarea('infoTextarea')">Copy FYI</button>
      <button class="action-btn clear" onclick="clearForm()">Clear</button>
    </div>

    <div id="updateMessage" class="custom-textarea" contenteditable="true" style="margin-top:5px;"></div>

    <div class="form-actions">
      <button class="action-btn" onclick="copyTextarea('updateMessage')">Copy Update</button>
      <button class="action-btn clear" onclick="clearUpdate()">Clear</button>
    </div>

  </div>
</div>

<div id="notification">✓ Berhasil disalin!</div>

<script>

/* ============================================================
   SUPABASE
   ============================================================ */
const SUPABASE_URL = "https://eaqmgrchnbetoetojdgu.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhcW1ncmNobmJldG9ldG9qZGd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwODY2NzEsImV4cCI6MjA5NjY2MjY3MX0.7v3yBoDiQbX1Y3Ass75MyaehdbiK0EjDPIIQKYdioM8";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);


/* ============================================================
   HELPERS
   ============================================================ */
function pad(n) { return String(n).padStart(2, "0"); }

function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

// Jupiter: per 2 jam
// Jam genap (0,2,4,...) → jam sekarang :00
// Jam ganjil (1,3,5,...) → jam +1 :00
function getCurrentTimeLabel() {
  const h = new Date().getHours();
  const reportH = h % 2 === 1 ? (h + 1) % 24 : h;
  return `${pad(reportH)}:00 WIB`;
}


/* ============================================================
   CACHE & STATE
   ============================================================ */
let cache      = null;
let dragSrc    = null;
let searchQuery = "";


/* ============================================================
   SKELETON
   ============================================================ */
function renderSkeleton() {
  document.getElementById("templatePanel").innerHTML = `
    <div class="skeleton long"></div>
    <div class="skeleton short"></div>
    <div class="skeleton long"></div>
    <div class="skeleton short"></div>`;
}


/* ============================================================
   RENDER PANEL KIRI  (diff-aware)
   ============================================================ */
function renderPanel(data) {
  const panel    = document.getElementById("templatePanel");
  const query    = searchQuery.toLowerCase();
  const filtered = data.filter(x => x.template.toLowerCase().includes(query));

  // ── header (idempotent) ─────────────────────────────────
  let header = panel.querySelector(".panel-header");
  if (!header) {
    header = document.createElement("div");
    header.className = "panel-header";
    header.innerHTML = `
      <h3>Template Pesan</h3>
      <button class="addBtn">+ Tambah</button>
      <input class="search-input" placeholder="Cari template…" value="${searchQuery}">`;
    header.querySelector(".addBtn").addEventListener("click", addData);
    header.querySelector(".search-input").addEventListener("input", function () {
      searchQuery = this.value;
      renderPanel(cache || []);
    });
    panel.innerHTML = "";
    panel.appendChild(header);
  }

  // ── diff rows ────────────────────────────────────────────
  const existingRows = {};
  panel.querySelectorAll(".row[data-id]").forEach(el => {
    existingRows[el.dataset.id] = el;
  });

  const ordered = [];
  filtered.forEach(x => {
    const sid = String(x.id);
    let row = existingRows[sid];

    if (row) {
      const textEl = row.querySelector(".text");
      if (textEl.dataset.template !== x.template) {
        textEl.dataset.template = x.template;
        textEl.textContent = x.template.replaceAll("{TIME}", getCurrentTimeLabel());
      }
      delete existingRows[sid];
    } else {
      row = buildRow(x);
    }
    ordered.push(row);
  });

  Object.values(existingRows).forEach(el => el.remove());
  ordered.forEach(row => panel.appendChild(row));

  // empty state
  let empty = panel.querySelector(".empty-msg");
  if (filtered.length === 0) {
    if (!empty) {
      empty = document.createElement("p");
      empty.className = "empty-msg";
      empty.textContent = "Tidak ada template.";
    }
    panel.appendChild(empty);
  } else if (empty) {
    empty.remove();
  }
}

function buildRow(x) {
  const row = document.createElement("div");
  row.className  = "row";
  row.dataset.id = x.id;
  row.draggable  = true;

  const textDiv = document.createElement("div");
  textDiv.className        = "text";
  textDiv.dataset.template = x.template;
  textDiv.textContent      = x.template.replaceAll("{TIME}", getCurrentTimeLabel());

  const copyBtn = document.createElement("button");
  copyBtn.className   = "copy-btn";
  copyBtn.textContent = "Copy";
  copyBtn.addEventListener("click", () =>
    copyToClipboard(x.template.replaceAll("{TIME}", getCurrentTimeLabel()))
  );

  const editBtn = document.createElement("button");
  editBtn.className   = "edit-btn";
  editBtn.textContent = "Edit";
  editBtn.addEventListener("click", () => editData(x.id));

  const delBtn = document.createElement("button");
  delBtn.className   = "del-btn";
  delBtn.textContent = "X";
  delBtn.addEventListener("click", () => deleteData(x.id));

  // drag events
  row.addEventListener("dragstart", e => {
    dragSrc = row;
    row.classList.add("dragging");
    e.dataTransfer.effectAllowed = "move";
  });
  row.addEventListener("dragend", () => {
    row.classList.remove("dragging");
    document.querySelectorAll(".row.drag-over")
      .forEach(el => el.classList.remove("drag-over"));
  });
  row.addEventListener("dragover", e => {
    e.preventDefault();
    if (dragSrc && dragSrc !== row) row.classList.add("drag-over");
  });
  row.addEventListener("dragleave", () => row.classList.remove("drag-over"));
  row.addEventListener("drop", e => {
    e.stopPropagation();
    row.classList.remove("drag-over");
    if (!dragSrc || dragSrc === row) return;

    const parent = row.parentNode;
    const rows   = [...parent.querySelectorAll(".row[data-id]")];
    const srcIdx = rows.indexOf(dragSrc);
    const tgtIdx = rows.indexOf(row);
    if (srcIdx < tgtIdx) parent.insertBefore(dragSrc, row.nextSibling);
    else                  parent.insertBefore(dragSrc, row);

    saveSortOrder(parent);
  });

  row.append(textDiv, copyBtn, editBtn, delBtn);
  return row;
}

async function saveSortOrder(parent) {
  const rows = [...parent.querySelectorAll(".row[data-id]")];
  await Promise.all(
    rows.map((el, i) =>
      db.from("jupiter_messages").update({ sort_order: i }).eq("id", el.dataset.id)
    )
  );
}


/* ============================================================
   LOAD
   ============================================================ */
const MAX_RETRIES = 3;

function isRetryable(error) {
  if (!error) return false;
  const msg  = (error.message || "").toLowerCase();
  const code = (error.code    || "");
  if (msg.includes("datacloneerror")) return false;
  if (msg.includes("postmessage"))    return false;
  if (/^(pgrst|[0-9A-Z]{5})/.test(code)) return false;
  return true;
}

async function loadData(showSkeleton = false, retryCount = 0) {
  if (showSkeleton && !cache) renderSkeleton();

  let data, error;
  try {
    ({ data, error } = await db
      .from("jupiter_messages")
      .select("*")
      .order("sort_order"));
  } catch (e) {
    if (cache) renderPanel(cache);
    return;
  }

  if (error) {
    if (isRetryable(error) && retryCount < MAX_RETRIES) {
      const delay = 1000 * 2 ** retryCount;
      console.warn(`[jupiter] retry ${retryCount + 1} in ${delay}ms…`, error.message);
      setTimeout(() => loadData(false, retryCount + 1), delay);
    } else {
      if (cache) {
        renderPanel(cache);
      } else {
        document.getElementById("templatePanel").innerHTML =
          `<p style="color:red;">Gagal memuat data. Coba refresh halaman.</p>`;
      }
    }
    return;
  }

  cache = data || [];
  renderPanel(cache);
}

const debouncedLoad = debounce(() => loadData(), 400);

loadData(true);


/* ============================================================
   REALTIME
   ============================================================ */
let realtimeChannel = null;

function subscribeRealtime() {
  if (realtimeChannel) {
    db.removeChannel(realtimeChannel);
    realtimeChannel = null;
  }

  realtimeChannel = db.channel("jupiter-sync")
    .on(
      "postgres_changes",
      { event: "*", schema: "public", table: "jupiter_messages" },
      () => debouncedLoad()
    )
    .subscribe();
}

subscribeRealtime();

window.addEventListener("beforeunload", () => {
  if (realtimeChannel) db.removeChannel(realtimeChannel);
});


/* ============================================================
   CRUD
   ============================================================ */
async function addData() {
  const t = prompt(
`CATATAN:
- Gunakan {TIME} untuk jam otomatis.

Contoh:
All Beam Pukul {TIME}`
  );
  if (!t) return;
  await db.from("jupiter_messages").insert({ template: t, sort_order: 999 });
}

async function editData(id) {
  const { data } = await db
    .from("jupiter_messages")
    .select("*")
    .eq("id", id)
    .single();

  const t = prompt("Edit template:", data.template);
  if (!t) return;
  await db.from("jupiter_messages").update({ template: t }).eq("id", id);
}

async function deleteData(id) {
  if (!confirm("Hapus template ini?")) return;
  await db.from("jupiter_messages").delete().eq("id", id);
}


/* ============================================================
   CLOCK
   ============================================================ */
let lastHourLabel = "";
let lastMinute    = -1;

function updateTimeDisplay() {
  document.querySelectorAll(".text[data-template]").forEach(el => {
    if (el.dataset.template.includes("{TIME}")) {
      el.textContent = el.dataset.template.replaceAll("{TIME}", getCurrentTimeLabel());
    }
  });
  // juga update textarea panel kanan kalau sedang aktif
  refreshDropdownTextareas();
}

function updateClock() {
  const now = new Date();
  const h   = now.getHours();
  const m   = now.getMinutes();
  const s   = now.getSeconds();

  document.getElementById("clock").textContent =
    `${pad(h)}:${pad(m)}:${pad(s)}`;

  document.title = `${pad(h)}:${pad(m)} | Jupiter Dashboard`;

  // update display {TIME} setiap menit
  if (m !== lastMinute) {
    lastMinute = m;
    updateTimeDisplay();
  }

  // trigger reload setiap jam berubah (per 2 jam logic tidak perlu reload,
  // cukup updateTimeDisplay sudah handle tampilan)
  const reportH = h % 2 === 1 ? (h + 1) % 24 : h;
  const label   = `${pad(reportH)}:00`;
  if (label !== lastHourLabel) {
    lastHourLabel = label;
    debouncedLoad();
  }
}

setInterval(updateClock, 1000);
updateClock();


/* ============================================================
   DROPDOWN — PANEL KANAN
   ============================================================ */
document.getElementById("menuSelect").addEventListener("change", function () {
  const val              = this.value;
  const beamWrapper      = document.getElementById("beamOptionsWrapper");
  const beamSelect       = document.getElementById("beamSelect");

  if (val === "Beam XXX") {
    beamWrapper.classList.remove("hidden");
    beamSelect.value = "";
    updateTextareas(val, "");
  } else {
    beamWrapper.classList.add("hidden");
    beamSelect.value = "";
    updateTextareas(val, "");
  }
});

document.getElementById("beamSelect").addEventListener("change", function () {
  const mainMenu = document.getElementById("menuSelect").value;
  updateTextareas(mainMenu, this.value);
});

function updateTextareas(mainMenu, beam) {
  const fyi    = document.getElementById("infoTextarea");
  const update = document.getElementById("updateMessage");
  const label  = beam || mainMenu;

  if (label) {
    fyi.innerHTML    = `*Fyi,*<br><br>Termonitor terjadi penurunan presentase *Jupiter ${label}* pada dashboard BETA-INMS, Saat ini sedang dalam pengecekan.<br><br>Terima kasih`;
    update.innerHTML = `*Update*<br><br>Termonitor presentase *Jupiter ${label}* sudah berangsur normal kembali pada dashboard BETA-INMS.<br><br>Terima kasih`;
  } else {
    fyi.innerHTML    = "Pilih pada drop-down diatas";
    update.innerHTML = "Pilih pada drop-down diatas";
  }
}

// dipanggil saat menit berubah — refresh textarea kalau sedang diisi
function refreshDropdownTextareas() {
  const mainMenu = document.getElementById("menuSelect").value;
  const beam     = document.getElementById("beamSelect").value;
  if (mainMenu) updateTextareas(mainMenu, beam);
}

function copyTextarea(id) {
  const el   = document.getElementById(id);
  const text = el.innerText;
  copyToClipboard(text);
}

function clearForm() {
  document.getElementById("menuSelect").value  = "";
  document.getElementById("beamSelect").value  = "";
  document.getElementById("beamOptionsWrapper").classList.add("hidden");
  document.getElementById("infoTextarea").innerHTML   = "";
  document.getElementById("updateMessage").innerHTML  = "";
}

function clearUpdate() {
  document.getElementById("updateMessage").innerHTML = "";
}


/* ============================================================
   CLIPBOARD + TOAST
   ============================================================ */
let toastTimer;

function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(() => {
    const notif = document.getElementById("notification");
    notif.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => notif.classList.remove("show"), 2000);
  });
}

</script>
</body>
</html>
