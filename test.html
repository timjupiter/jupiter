<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XPOLL SATDIV REALTIME</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

html,body{
    margin:0;
    padding:0;
    font-family:Segoe UI,sans-serif;
    background:#f1f5f9;
}

.container-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:18px;
    padding:18px;
}

.form-card{
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 8px 24px rgba(0,0,0,.06);
    display:flex;
    flex-direction:column;
}

.form-header{
    padding:14px;
    color:#fff;
    text-align:center;
    font-weight:700;
    transition:.3s;
}

.blue{background:linear-gradient(135deg,#2563eb,#1d4ed8);}
.red{background:linear-gradient(135deg,#dc2626,#b91c1c);}
.green{background:linear-gradient(135deg,#16a34a,#15803d);}

.body{
    padding:16px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

input,select{
    padding:10px;
    border:1px solid #e5e7eb;
    border-radius:12px;
}

.label{
    font-size:12px;
    font-weight:700;
}

.provider{
    padding:10px;
    border:1px solid #e5e7eb;
    border-radius:12px;
    background:#f8fafc;
}

.btn-row{
    display:flex;
    gap:10px;
}

button{
    flex:1;
    padding:10px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:700;
}

.copy{background:#2563eb;color:#fff;}
.clear{background:#6b7280;color:#fff;}

.toast{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#111827;
    color:#fff;
    padding:12px 18px;
    border-radius:12px;
    opacity:0;
    transition:.3s;
    text-align:center;
    white-space:pre-line;
    line-height:1.4;
}

.toast.show{opacity:1;}

@media(max-width:900px){
    .container-grid{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<div class="container-grid" id="app"></div>

<div class="toast" id="toast">COPIED ✓</div>

<script>

// ================= SUPABASE =================
// FIX: createClient butuh base URL project, BUKAN path /rest/v1/.
// Kalau ada /rest/v1/ di belakangnya, semua request (upsert, select, realtime) bakal salah arah.
const SUPABASE_URL = "https://eaqmgrchnbetoetojdgu.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhcW1ncmNobmJldG9ldG9qZGd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwODY2NzEsImV4cCI6MjA5NjY2MjY3MX0.7v3yBoDiQbX1Y3Ass75MyaehdbiK0EjDPIIQKYdioM8";

// FIX: jangan pakai nama "supabase" untuk variabel client — itu nge-shadow
// namespace global window.supabase dari library, dan browser akan throw
// "Identifier 'supabase' has already been declared".
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ================= DATA =================
const FRQ_LIST = ["59820000","59821000","59822000"];

const PROVIDER = {
"1":"BRI","2":"PT. TELEKOMUNIKASI INDONESIA","3":"PT. SATKOMINDO MEDIYASA",
"4":"PT. TANGARA MITRAKOM","5":"PT. PASIFIK SATELIT NUSANTARA",
"6":"PT. PATRA TELEKOMUNIKASI INDONESIA","7":"TELKOMSEL","8":"INDOSAT",
"9":"XL","A":"PT. Indonesia Comnets Plus","B":"PT. CSM","C":"PT. LINTASARTA",
"D":"PT. TELKOMCELL","E":"PT. Mega Akses Persada","F":"PT. INDUSTRI TELEKOMUNIKASI INDONESIA",
"G":"SATLINK","H":"PT. Mora Telematika Indonesia","K":"PT. TELKOMSAT"
};

// ================= RENDER UI =================
const app = document.getElementById("app");

FRQ_LIST.forEach((frq)=>{

app.innerHTML += `
<div class="form-card">

<div class="form-header blue" id="header-${frq}">
${frq} - AVAILABLE
</div>

<div class="body">

<div class="label">ESN</div>
<input id="esn-${frq}" oninput="onFieldInput('${frq}')">

<div class="label">SITE ID</div>
<input id="site-${frq}" oninput="onFieldInput('${frq}')">

<div class="label">LFT</div>
<input id="lft-${frq}" oninput="onFieldInput('${frq}')">

<div class="label">EXECUTOR</div>
<select id="exec-${frq}" onchange="onFieldInput('${frq}')">
<option value="" selected>-- PILIH --</option>
<option>RAGUNAN</option>
<option>TABANAN</option>
</select>

<div class="label">PROVIDER</div>
<div class="provider" id="prov-${frq}">-</div>

<div class="btn-row">
<button class="copy" onclick="copyData('${frq}')">COPY</button>
<button class="clear" onclick="clearCard('${frq}')">CLEAR</button>
</div>

</div>
</div>
`;
});

// ================= DEBOUNCE HELPER =================
// FIX: mencegah upsert dikirim ke Supabase di SETIAP keystroke.
// UI (header/provider) tetap update instan, tapi network request di-debounce.
const debounceTimers = {};
function debounce(key, fn, delay = 400){
    clearTimeout(debounceTimers[key]);
    debounceTimers[key] = setTimeout(fn, delay);
}

// Flag supaya saat menerima update realtime, kita tidak langsung
// upsert ulang data yang baru saja kita terima (mencegah loop/race).
const suppressUpsert = {};

// ================= INPUT HANDLER =================
function onFieldInput(frq){
    updateLocalUI(frq);
    if(suppressUpsert[frq]) return;
    debounce(frq, ()=>saveToSupabase(frq));
}

// ================= UPDATE UI (LOKAL, TANPA NETWORK) =================
function updateLocalUI(frq){

    const esn = document.getElementById(`esn-${frq}`).value;
    const header = document.getElementById(`header-${frq}`);

    if(esn){
        header.className = "form-header red";

        const now = new Date();
        const hari = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];

        header.innerHTML =
        `Onprogres<br>${hari[now.getDay()]}, ${now.toLocaleString()} WIB`;

    }else{
        header.className = "form-header blue";
        header.innerHTML = `${frq} - AVAILABLE`;
    }

    // provider
    const site = document.getElementById(`site-${frq}`).value;
    const p = site ? (PROVIDER[site.charAt(0).toUpperCase()] || "CHECK SITE ID") : "-";
    document.getElementById(`prov-${frq}`).innerText = p;

    return { esn, site, provider: p };
}

// ================= SAVE TO SUPABASE =================
async function saveToSupabase(frq){

    const esn  = document.getElementById(`esn-${frq}`).value;
    const site = document.getElementById(`site-${frq}`).value;
    const lft  = document.getElementById(`lft-${frq}`).value;
    const exec = document.getElementById(`exec-${frq}`).value;
    const provider = site ? (PROVIDER[site.charAt(0).toUpperCase()] || "CHECK SITE ID") : "-";

    const { error } = await supabaseClient.from("satdiv_xpoll").upsert({
        frq,
        esn,
        site_id: site,
        lft,
        executor: exec,
        provider,
        status: esn ? "ONPROGRES" : "AVAILABLE",
        updated_at: new Date().toISOString()
    }, { onConflict: "frq" }); // FIX: pastikan upsert konflik di kolom frq, butuh unique constraint di tabel

	if(error){
		console.error("Supabase upsert error:", error.message);
		showToast("CLEARED\nGAGAL SIMPAN ✗");
	}
}

// ================= COPY =================
function copyData(frq){

    const text =
`ESN : ${document.getElementById(`esn-${frq}`).value}
SID : ${document.getElementById(`site-${frq}`).value}
LFT : ${document.getElementById(`lft-${frq}`).value}
FRQ : ${frq}

*CW ON*`;

    // FIX: navigator.clipboard butuh konteks aman (https/localhost) dan bisa
    // gagal silent kalau permission ditolak — sekarang error-nya ditangkap.
    if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(text)
            .then(()=>showToast("COPIED ✓"))
            .catch(()=>fallbackCopy(text));
    } else {
        fallbackCopy(text);
    }
}

function fallbackCopy(text){
    // Fallback untuk browser/HTTP non-secure context yang tidak punya Clipboard API
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try{
        document.execCommand("copy");
        showToast("COPIED ✓");
    }catch(e){
        showToast("COPY GAGAL ✗");
    }
    document.body.removeChild(ta);
}

// ================= CLEAR =================
function clearCard(frq){

    document.getElementById(`esn-${frq}`).value="";
    document.getElementById(`site-${frq}`).value="";
    document.getElementById(`lft-${frq}`).value="";
    document.getElementById(`exec-${frq}`).value=""; // FIX: executor ikut reset ke "-- PILIH --"

    updateLocalUI(frq);
    saveToSupabase(frq); // langsung simpan saat clear, tanpa nunggu debounce
}

// ================= REALTIME =================
supabaseClient
.channel("xpoll")
.on("postgres_changes",
    { event:"*", schema:"public", table:"satdiv_xpoll" },
    payload => {

        const d = payload.new;
        if(!d || !d.frq) return;
        if(!FRQ_LIST.includes(d.frq)) return; // FIX: jaga-jaga kalau ada row frq lain

        const frq = d.frq;

        // FIX: cegah perubahan dari realtime memicu upsert balik (loop)
        suppressUpsert[frq] = true;

        const esnEl  = document.getElementById(`esn-${frq}`);
        const siteEl = document.getElementById(`site-${frq}`);
        const lftEl  = document.getElementById(`lft-${frq}`);
        const execEl = document.getElementById(`exec-${frq}`);

        if(esnEl)  esnEl.value  = d.esn || "";
        if(siteEl) siteEl.value = d.site_id || "";
        if(lftEl)  lftEl.value  = d.lft || "";
        if(execEl) execEl.value = d.executor || ""; // FIX: executor ikut sinkron, termasuk saat di-reset jadi kosong

        updateLocalUI(frq);

        suppressUpsert[frq] = false;
    }
)
.subscribe((status, err)=>{
    if(err) console.error("Realtime subscribe error:", err);
});

// ================= TOAST =================
function showToast(message = "COPIED ✓"){
    const t = document.getElementById("toast");
    t.innerText = message;
    t.classList.add("show");
    setTimeout(()=>t.classList.remove("show"),1200);
}

</script>

</body>
</html>
