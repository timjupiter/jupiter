.copy,

.addBtn{

    transform:translateX(-50%);

    visibility:hidden;
    transition:0.3s;
}

.notification.show{

function copyTextToClipboard(text){

    navigator.clipboard.writeText(text).then(()=>{

        const notification =
        document.getElementById('notification');

        notification.classList.add('show');

        setTimeout(()=>{
            notification.classList.remove('show');
        },2000);

    });

}



/* =========================
CLOCK
========================= */

let currentTime="00:00 WIB";

function updateClock(){

    const now = new Date();

    let hours = now.getHours();

    const minutes = now.getMinutes();

    const seconds = now.getSeconds();



    const formattedTime =

`${String(hours).padStart(2,'0')}:
${String(minutes).padStart(2,'0')}:
${String(seconds).padStart(2,'0')}`;



    document.getElementById('clock')
    .textContent = formattedTime;



    if(minutes >= 30)
    hours += 1;



    if(hours === 24)
    hours = 0;



    currentTime =
`${String(hours).padStart(2,'0')}:00 WIB`;

}

setInterval(updateClock,1000);

updateClock();



/* =========================
SUPABASE LOAD
========================= */

async function load(section){

    let box =
    document.getElementById(section);



    let {data,error} = await db

    .from("h2h_messages")

    .select("*")

    .eq("section",section)

    .order("sort_order");



    if(error){

        box.innerHTML = error.message;

        return;

    }



    box.innerHTML =

`
<h3>${section.toUpperCase()}</h3>

<button class="addBtn"
onclick="addData('${section}')">
+ Tambah
</button>
`;



    data.forEach(x=>{

        let text =
        x.template.replaceAll(
        "{TIME}",
        currentTime
        );



        box.innerHTML +=

`
<div class="row">

<div class="text">
${text}
</div>

<button class="copy"
onclick="copyTextToClipboard(\`${text}\`)">
Copy
</button>

<button class="edit"
onclick="editData(${x.id})">
Edit
</button>

<button class="del"
onclick="deleteData(${x.id})">
X
</button>

</div>
`;

    });

}



function loadAll(){

    load("mrtg");

    load("dashboard");

    load("update");

}



/* =========================
CRUD
========================= */

async function addData(section){

    let t = prompt(

`CATATAN:
- Gunakan {TIME} untuk jam otomatis.

Contoh:
Gangguan terdeteksi pukul {TIME}`

    );



    if(!t) return;



    await db

    .from("h2h_messages")

    .insert({

        section:section,

        template:t,

        sort_order:999

    });



    loadAll();

}





async function editData(id){

    let {data} = await db

    .from("h2h_messages")

    .select("*")

    .eq("id",id)

    .single();



    let t = prompt(
    "Edit template:",
    data.template
    );



    if(!t) return;



    await db

    .from("h2h_messages")

    .update({

        template:t

    })

    .eq("id",id);



    loadAll();

}





async function deleteData(id){

    if(!confirm("hapus?"))
    return;



    await db

    .from("h2h_messages")

    .delete()

    .eq("id",id);



    loadAll();

}



/* =========================
REALTIME
========================= */

db.channel("h2h-sync")

.on(
"postgres_changes",
{
event:"*",
schema:"public",
table:"h2h_messages"
},
()=>loadAll()
)

.subscribe();



loadAll();

</script>
