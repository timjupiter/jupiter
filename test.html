<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presentasi Animasi</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.slide{
    text-align:center;
    color:white;
    animation:fadeIn 2s ease-in-out;
}

h1{
    font-size:4rem;
    animation:slideDown 1.5s ease-out;
}

p{
    font-size:1.5rem;
    animation:slideUp 2s ease-out;
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

@keyframes slideDown{
    from{
        transform:translateY(-100px);
        opacity:0;
    }
    to{
        transform:translateY(0);
        opacity:1;
    }
}

@keyframes slideUp{
    from{
        transform:translateY(100px);
        opacity:0;
    }
    to{
        transform:translateY(0);
        opacity:1;
    }
}
</style>
</head>

<body>
<div class="slide">
    <h1>Coming Soon</h1>
    <p>Kalau Developer-nya Nggak Mager</p>
</div>
</body>
</html>
