<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>H2H Panel</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
margin:20px;
display:flex;
gap:20px;
background:#eee;
}

#html1,#html2{
width:50%;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 10px #0002;
}

input,select,textarea,button{
width:100%;
padding:10px;
margin:6px 0;
box-sizing:border-box;
}

button{
cursor:pointer;
border-radius:6px;
border:0;
}

#clock{
font-size:40px;
background:#343a40;
color:white;
padding:20px;
text-align:center;
border-radius:10px;
}

.box{
background:#f7f7f7;
padding:10px;
margin-top:10px;
border-radius:10px;
}

.row{
display:flex;
gap:5px;
align-items:center;
border-bottom:1px solid #ddd;
padding:8px;
}

.text{
flex:1;
}


/* tombol kecil */
.row .copy,
.row .edit,
.row .del{
width:auto !important;
padding:4px 8px !important;
margin:0 !important;
font-size:12px !important;
height:28px !important;
flex:none;
}


.copy{
background:#007bff;
color:white;
}

.edit{
background:#ffc107;
}

.del{
background:#dc3545;
color:white;
}

#toast{
position:fixed;
bottom:25px;
right:25px;
background:#222;
color:white;
padding:12px 20px;
border-radius:10px;
opacity:0;
transition:.3s;
pointer-events:none;
z-index:9999;
}

#toast.show{
opacity:1;
}

</style>

</head>


<body>

<div id="toast">Copied!</div>

<script>

const SUPABASE_URL =
"https://eaqmgrchnbetoetojdgu.supabase.co";


const SUPABASE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhcW1ncmNobmJldG9ldG9qZGd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwODY2NzEsImV4cCI6MjA5NjY2MjY3MX0.7v3yBoDiQbX1Y3Ass75MyaehdbiK0EjDPIIQKYdioM8";


const db = supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

</script>



<div id="html1">

<h2>H2H Generator</h2>

<input id="device" placeholder="Nama perangkat">


<select id="status">

<option value="online">
Online
</option>

<option value="offline">
Offline
</option>

</select>


<button onclick="generate()">
Generate
</button>


<textarea id="result"></textarea>


<button onclick="copyText(result.value)">
Copy Hasil
</button>


</div>





<div id="html2">


<div id="clock">
00:00:00
</div>


<div id="mrtg" class="box"></div>

<div id="dashboard" class="box"></div>

<div id="update" class="box"></div>


</div>





<script>


let currentTime="00:00 WIB";



function copyText(t){

navigator.clipboard.writeText(t);


let toast =
document.getElementById("toast");


toast.innerHTML="Copied!";


toast.classList.add("show");


setTimeout(()=>{

toast.classList.remove("show");

},1500);


}




function generate(){


let name=device.value;


result.value =
`FYI,

Kami informasikan status koneksi *${name}*
termonitor *${status.value.toUpperCase()}*.

Terimakasih.`;



result.style.display="block";


}






function clockUpdate(){


let d=new Date();


let h=d.getHours();

let m=d.getMinutes();

let s=d.getSeconds();



clock.innerHTML =
`${String(h).padStart(2,"0")}:
${String(m).padStart(2,"0")}:
${String(s).padStart(2,"0")}`;



if(m>=30) h++;


currentTime =
`${String(h).padStart(2,"0")}:00 WIB`;

}


setInterval(clockUpdate,1000);

clockUpdate();









async function load(section){



let box=document.getElementById(section);



let {data,error}=await db

.from("h2h_messages")

.select("*")

.eq("section",section)

.order("sort_order");



if(error){

box.innerHTML =
error.message;

return;

}




box.innerHTML =
`

<h3>${section.toUpperCase()}</h3>

<button onclick="addData('${section}')">
+ Tambah
</button>

`;




data.forEach(x=>{


let text=x.template.replaceAll(
"{TIME}",
currentTime
);



box.innerHTML +=
`

<div class="row">


<div class="text">
${text}
</div>


<button class="copy"
onclick="copyText(\`${text}\`)">
Copy
</button>



<button class="edit"
onclick="editData(${x.id})">
Edit
</button>



<button class="del"
onclick="deleteData(${x.id})">
X
</button>


</div>

`;

});


}






function loadAll(){

load("mrtg");

load("dashboard");

load("update");

}







async function addData(section){


let t=prompt(
`
CATATAN:
- Gunakan {TIME} jika ingin menampilkan jam otomatis.

Contoh:
Gangguan terdeteksi pukul {TIME}`
);


if(!t)return;



await db
.from("h2h_messages")
.insert({

section:section,

template:t,

sort_order:999

});


loadAll();


}







async function editData(id){


let {data}=await db
.from("h2h_messages")
.select("*")
.eq("id",id)
.single();



let t=prompt(
"Edit template:",
data.template
);



if(!t)return;



await db
.from("h2h_messages")
.update({

template:t

})
.eq("id",id);



loadAll();


}







async function deleteData(id){


if(!confirm("hapus?"))
return;



await db
.from("h2h_messages")
.delete()
.eq("id",id);



loadAll();


}






db.channel("h2h-sync")

.on(
"postgres_changes",
{
event:"*",
schema:"public",
table:"h2h_messages"
},
()=>loadAll()
)

.subscribe();





loadAll();


</script>


</body>
</html>
