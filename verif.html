<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifikasi</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
.container-grid {
    display: grid;
    gap: 1.5rem;
}

@media (orientation: landscape) {
    .container-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (orientation: portrait) {
    .container-grid {
        grid-template-columns: repeat(1, 1fr);
    }
}
</style>

</head>

<body class="bg-gray-100 p-4 font-sans">

<div class="container-grid">

<!-- ================= FORM 1 ================= -->
<div class="bg-white rounded-xl shadow-md border">

<div class="bg-blue-600 text-white px-4 py-2 rounded-t-xl font-semibold">
    Form Verifikasi 1
</div>

<div class="p-4 space-y-3">

<textarea id="input1" class="w-full p-3 border rounded-lg" placeholder="Paste dari request provider..."></textarea>

<div class="flex gap-2">
<input id="beam1" placeholder="Beam" class="flex-1 border p-2 rounded-lg">
<input id="sqf1" placeholder="SQF" class="flex-1 border p-2 rounded-lg">
<input id="esno1" placeholder="ESNO" class="flex-1 border p-2 rounded-lg">
</div>

<!-- LAT LONG -->
<div>
<label class="text-sm font-semibold text-red-500">
Status Latitude dan Longitude:
</label>

<div class="flex gap-4 text-sm mt-1">
<label><input type="radio" name="lat1" value="Sesuai"> ✅ Sesuai</label>
<label><input type="radio" name="lat1" value="Belum"> ❌ Belum</label>
</div>
</div>

<!-- VERIF -->
<div class="space-y-2">
<label class="text-sm font-semibold">Verifikasi</label>
<textarea id="verif1" class="w-full h-32 border rounded-lg p-2 bg-gray-50"></textarea>
<button onclick="copyText('verif1')" 
class="w-full bg-blue-600 text-white py-2 rounded-lg">
📋 Copy Verifikasi
</button>
</div>

<div class="mt-5"></div>

<!-- TEMP -->
<div class="space-y-2">
<label class="text-sm font-semibold">Temporary</label>
<textarea id="temp1" class="w-full h-32 border rounded-lg p-2 bg-gray-50"></textarea>
<button onclick="copyText('temp1')" 
class="w-full bg-indigo-500 text-white py-2 rounded-lg">
📋 Copy Temporary
</button>
</div>

<button onclick="clearForm(1)" class="w-full bg-gray-300 py-2 rounded-lg mt-3">
Clear
</button>

</div>
</div>


<!-- ================= FORM 2 ================= -->
<div class="bg-white rounded-xl shadow-md border">

<div class="bg-green-600 text-white px-4 py-2 rounded-t-xl font-semibold">
    Form Verifikasi 2
</div>

<div class="p-4 space-y-3">

<textarea id="input2" class="w-full p-3 border rounded-lg" placeholder="Paste dari request provider..."></textarea>

<div class="flex gap-2">
<input id="beam2" placeholder="Beam" class="flex-1 border p-2 rounded-lg">
<input id="sqf2" placeholder="SQF" class="flex-1 border p-2 rounded-lg">
<input id="esno2" placeholder="ESNO" class="flex-1 border p-2 rounded-lg">
</div>

<!-- LAT LONG -->
<div>
<label class="text-sm font-semibold text-red-500">
Status Latitude dan Longitude:
</label>

<div class="flex gap-4 text-sm mt-1">
<label><input type="radio" name="lat2" value="Sesuai"> ✅ Sesuai</label>
<label><input type="radio" name="lat2" value="Belum"> ❌ Belum</label>
</div>
</div>

<!-- VERIF -->
<div class="space-y-2">
<label class="text-sm font-semibold">Verifikasi</label>
<textarea id="verif2" class="w-full h-32 border rounded-lg p-2 bg-gray-50"></textarea>
<button onclick="copyText('verif2')" 
class="w-full bg-green-600 text-white py-2 rounded-lg">
📋 Copy Verifikasi
</button>
</div>

<div class="mt-5"></div>

<!-- TEMP -->
<div class="space-y-2">
<label class="text-sm font-semibold">Temporary</label>
<textarea id="temp2" class="w-full h-32 border rounded-lg p-2 bg-gray-50"></textarea>
<button onclick="copyText('temp2')" 
class="w-full bg-teal-500 text-white py-2 rounded-lg">
📋 Copy Temporary
</button>
</div>

<button onclick="clearForm(2)" class="w-full bg-gray-300 py-2 rounded-lg mt-3">
Clear
</button>

</div>
</div>

</div>


<script>

function update(f) {

    const input = document.getElementById(`input${f}`).value;
    const beam = document.getElementById(`beam${f}`).value;
    const sqf = document.getElementById(`sqf${f}`).value;
    const esno = document.getElementById(`esno${f}`).value;

    const selected = document.querySelector(`input[name="lat${f}"]:checked`)?.value;

    let latText = '';
    if (selected === 'Sesuai') {
        latText = 'Latitude dan Longtitude Sudah Sesuai';
    } else if (selected === 'Belum') {
        latText = 'Latitude dan Longtitude Belum Sesuai';
    }

    document.getElementById(`verif${f}`).value =
`*Summary sudah sesuai standarisasi*

${input}

*Note :  -*
*Beam : ${beam}*
*SQF : ${sqf}*
*ESNO : ${esno}*
*${latText}*`;

    document.getElementById(`temp${f}`).value =
`*Summary Temporary*

${input}

*Note :   XPOLL Belum Lolos (RECHECK), SQF dan ESNO Sesuai Standarisasi*
*Beam : ${beam}*
*SQF : ${sqf}*
*ESNO : ${esno}*
*${latText}*`;
}


[1,2].forEach(f => {

    ['input','beam','sqf','esno'].forEach(id => {
        document.getElementById(id+f).addEventListener('input', () => update(f));
    });

    document.querySelectorAll(`input[name="lat${f}"]`).forEach(r => {

        r.addEventListener('click', function() {

            if (this.prev) this.checked = false;

            document.querySelectorAll(`input[name="lat${f}"]`)
                .forEach(x => x.prev = false);

            this.prev = this.checked;

            update(f);
        });

    });

});


function copyText(id) {
    const el = document.getElementById(id);
    el.select();
    document.execCommand('copy');
}


function clearForm(f) {
    ['input','beam','sqf','esno','verif','temp'].forEach(id=>{
        document.getElementById(id+f).value='';
    });

    document.querySelectorAll(`input[name="lat${f}"]`).forEach(r=>{
        r.checked=false;
        r.prev=false;
    });
}

</script>

</body>
</html>
